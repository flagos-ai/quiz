    .toast.show { opacity:1; }
    .title-card { background:rgba(0,20,40,0.5); border:1px solid rgba(0,160,255,0.4); border-radius:16px; padding:12px; margin:12px 0; text-align:left; }
    .title-card p { color:#b0cce5; font-size:0.9rem; line-height:1.5; }
    .mbti-badge { display:inline-block; background:#2a8cff; color:#081a24; padding:2px 10px; border-radius:12px; font-size:0.75rem; letter-spacing:2px; margin:8px 0; font-weight:bold; }

<body>
  <div class="tech-bg"></div>
  <div class="light-sweep"></div>
  <div class="app-container" id="appContainer">
    <div class="toast" id="toast"></div>
    <div class="prize-modal-overlay hidden" id="prizeModal">
      <div class="prize-modal">
        <h3>江湖奖赏</h3>

    </div>
    <div class="card" id="mainCard">
      <div id="homeScreen">
        <div class="title-section">
          <h1 class="main-title">FlagOS盟主争夺</h1>
          <p class="sub-title">知识闯关：FlagOS知多少？</p>
        </div>
        <div class="divider"><span class="divider-line"></span><span class="divider-icon">&#9876;</span><span class="divider-line"></span></div>
        <p style="text-align:center; margin-bottom:10px; color:#8aaacc; font-size:0.95rem;">
          抽取 <strong style="color:#ffd966;">10</strong> 道考题（6单选 · 4多选）<br>
          <span style="color:#ffd966;">80分以上可获 <strong style="color:#fff;">Flag盟主</strong> 荣誉及精美礼品！</span>

        <div style="margin-bottom:20px;">

  <div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="预览" />
  </div>

  <script>
    const characterImages = {
      master: 'https://raw.githubusercontent.com/chenzheng0809-gif/flagos-assets/main/flag-master.png',
      ranger: 'https://raw.githubusercontent.com/chenzheng0809-gif/flagos-assets/main/flag-ranger.png',
      apprentice: 'https://raw.githubusercontent.com/chenzheng0809-gif/flagos-assets/main/flag-apprentice.png'
    };

    function openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.remove('hidden');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
    }

    function getCharacterImage(role, w=120, h=150, clickable=true) {
      const url = characterImages[role] || '';
      const onClick = clickable ? `onclick="event.stopPropagation(); openLightbox('${url}')"` : '';
      return `<img src="${url}" alt="角色" style="width:${w}px; height:${h}px; border-radius:16px; object-fit:cover; box-shadow:0 0 15px #2a8cff; cursor:pointer;" ${onClick} onerror="this.style.display='none'">`;
    }

    const questionBank = [
      { id: 1, type: 'single', question: 'FlagOS 是什么类型的产品？', options: ['大模型训练框架', '统一的 AI 系统软件平台', 'AI 芯片设计工具'], answer: 1 },
      { id: 8, type: 'single', question: 'FlagOS 的生态建设核心理念是什么？', options: ['烟囱式垂直整合', '统一互联互通', '封闭商业授权'], answer: 1 },
      { id: 'lang', type: 'single', question: 'FlagOS 提出了哪些算子编程语言？', options: ['Triton', 'Triton - TLE', 'TileLang'], answer: 1 },
      { id: 11, type: 'single', question: 'FlagOS 的统一编译器 FlagTree 基于以下哪个项目深度定制？', options: ['Triton', 'LLVM', 'PyTorch'], answer: 0 },
      { id: 12, type: 'single', question: 'FlagOS-Robo 核心解决了具身智能行业的哪些痛点？', options: ['机器人本体设计', '跨平台跨硬件的算法快速迁移', '具身模型预训练'], answer: 1 },
      { id: 9, type: 'single', question: '以下哪个 FlagOS 工具可实现算子开发周期缩短至 “小时” 级？', options: ['KernelGen', 'FlagPerf', 'FlagScale'], answer: 0 },
      { id: 'exclude', type: 'single', question: 'FlagOS 技术栈 DAY 0 实现的大模型多芯适配不包括？', options: ['DeepSeek V4', 'Qwen3.6', 'MiniMax M2.7', 'MiniCPM-o4.5', 'GLM-5.1'], answer: 4 },
      { id: 14, type: 'single', question: 'FlagOS 应用场景不包括哪些领域？', options: ['大模型训推', '科学计算', '机器人端云协同', '自动驾驶'], answer: 3 },
      { id: 13, type: 'multiple', question: 'FlagOS 的核心组件包括以下哪些？', options: ['算子库 FlagGems', '统一 AI 编译器 FlagTree', '统一通信库 Flag CX', '并行训练训练推框架 FlagScale'], answer: [0,1,2,3] },
      { id: 6, type: 'multiple', question: '以下关于 FlagGems 说法正确的是？', options: ['是基于 Triton 的高性能算子库', '已加入 PyTorch 基金会生态项目', '其包含的算子，支持多种 AI 芯片', '其算子数量已超过了 400+'], answer: [0,1,2,3] },
      { id: 10, type: 'multiple', question: 'FlagOS 发布的 12+ Skills 主要能解决以下哪些方面的问题？', options: ['模型适配与迁移', '算子生成与优化', '性能测试与调优', '容器配置与发布流程'], answer: [0,1,2,3] },
      { id: 7, type: 'multiple', question: '以下关于 FlagRelease 说法正确的是？', options: ['是开源大模型的跨芯迁移与统一发布平台', '致力于提升大模型应用的发布与交付效率', '支持 AI 应用的工程化部署与版本管理', '面向 10 家厂商的 12 款硬件发布了 70 + 个开源模型实例'], answer: [0,1,2,3] },
      { id: 16, type: 'multiple', question: 'FlagOS 支持哪些芯片架构？', options: ['NVIDIA', 'NPU', 'GPGPU', 'RISC-V AI', 'DSA', 'ARM'], answer: [0,1,2,3,4,5] },
      { id: 17, type: 'multiple', question: '以下哪些是 FlagOS 生态的合作伙伴类型？', options: ['芯片机构', '大模型机构', '云服务商', '操作系统'], answer: [0,1,2,3] }
    ];
    let quizQuestions = [], currentIndex = 0, score = 0, selectedOptions = null;
    function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
    function showScreen(screenId) {
      const card = document.getElementById('mainCard');
      card.classList.add('screen-transition');
      setTimeout(() => {
        ['homeScreen','quizScreen','resultScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        card.classList.remove('screen-transition');
      }, 200);
    }
    function trackEvent(e,d={}){ console.log('[Track]',e,d); }
    function openPrizeModal(){ document.getElementById('prizeModal').classList.remove('hidden'); }
    function closePrizeModal(){ document.getElementById('prizeModal').classList.add('hidden'); }
    function openCharacterModal(){ 
      document.getElementById('characterModal').classList.remove('hidden');
      buildCharacterList();
    }
    function closeCharacterModal(){ document.getElementById('characterModal').classList.add('hidden'); }
    function buildCharacterList() {
      const characters = [
        { role:'master', title:'一统江湖 · Flag盟主', mbti:'ROOT', desc:'深居FlagOS总舵，通晓编译器、训练框架与使能全链路。如隐世前辈般深不可测，一指便能将模型点化到任意芯片。此人言“兼容”，江湖便兼容。' },
        { role:'ranger', title:'逍遥游侠 · 跨芯行者', mbti:'FORK', desc:'能在Nvidia、NPU、GPGPU间自由迁移模型，左手算子库右手推理插件，洒脱如风。' },
        { role:'apprentice', title:'无名小卒 · 算子学徒', mbti:'BUG', desc:'刚入山门的初学者，算子代码写一句报三句，常把Triton与LLVM念反，但勤读残卷，眼中已有光。' }
      ];
      const container = document.getElementById('characterList');
      container.innerHTML = characters.map(c => `
        <div class="char-card">
          ${getCharacterImage(c.role, 75, 95)}
          <div class="char-info">
            <h4>${c.title}</h4>
            <span class="mbti-tag">${c.mbti}</span>
            <p>${c.desc}</p>
          </div>
        </div>
      `).join('');
    }
    function startQuiz(){
      const singles = questionBank.filter(q=>q.type==='single');
      const multiples = questionBank.filter(q=>q.type==='multiple');
      quizQuestions = [...shuffle(singles).slice(0,6), ...shuffle(multiples).slice(0,4)];
      currentIndex=0; score=0; selectedOptions=null;
      trackEvent('quiz_start');
      showScreen('quizScreen');
      renderQuestion();
    }
    function renderQuestion(){
      if(currentIndex>=quizQuestions.length){ finishQuiz(); return; }
      const q=quizQuestions[currentIndex];
      document.getElementById('questionText').textContent=q.question;
      document.getElementById('progressText').textContent=`内力 ${currentIndex+1}/${quizQuestions.length}`;
      document.getElementById('progressFill').style.width=`${(currentIndex/quizQuestions.length)*100}%`;
      document.getElementById('typeHint').textContent = q.type==='single' ? '【单枪匹马·单选】' : '【群英荟萃·多选】';
      const container=document.getElementById('optionsContainer');
      container.innerHTML='';
      selectedOptions = q.type==='single' ? null : [];
      q.options.forEach((opt,idx)=>{
        const item=document.createElement('div');
        item.className='option-item';
        item.innerHTML=`<span class="option-indicator">${String.fromCharCode(65+idx)}</span>${opt}`;
        item.addEventListener('click',(e) => selectOption(idx, q.type, e, item));
        container.appendChild(item);
      });
      document.getElementById('nextBtn').disabled=true;
      document.getElementById('nextBtn').innerHTML = currentIndex===quizQuestions.length-1 ? '提交答卷 · 论剑' : '下一招 →';
    }
    function selectOption(idx, type, event, element){
      const items=document.querySelectorAll('.option-item');
      if(event){
        const rect = element.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        element.style.setProperty('--x', `${x}px`);
        element.style.setProperty('--y', `${y}px`);
      }
      if(type==='single'){
        selectedOptions=idx;
        items.forEach((el,i) => {
          el.classList.remove('selected');
          if(i===idx) el.classList.add('selected');
        });
        document.getElementById('nextBtn').disabled=false;
      }else{
        if(selectedOptions.includes(idx)) selectedOptions=selectedOptions.filter(i=>i!==idx);
        else selectedOptions.push(idx);
        items.forEach((el,i)=>{
          if(selectedOptions.includes(i)) el.classList.add('selected');
          else el.classList.remove('selected');
        });
        document.getElementById('nextBtn').disabled=selectedOptions.length===0;
      }
    }
    function nextQuestion(){
      const q=quizQuestions[currentIndex];
      let correct=false;
      if(q.type==='single') correct=selectedOptions===q.answer;
      else {
        const sortedUser=[...selectedOptions].sort((a,b)=>a-b);
        const sortedAns=[...q.answer].sort((a,b)=>a-b);
        correct=JSON.stringify(sortedUser)===JSON.stringify(sortedAns);
      }
      if(correct) score+=10;
      currentIndex++;
      if(currentIndex>=quizQuestions.length) finishQuiz();
      else renderQuestion();
    }
    function getTitleAndDesc(score) {
      if (score >= 80) return {
        title: '一统江湖 · Flag盟主', mbti: 'ROOT',
        desc: '深居FlagOS总舵，通晓编译器、训练框架与使能全链路。如隐世前辈般深不可测，一指便能将模型点化到任意芯片。此人言“兼容”，江湖便兼容。',
        comment: '盟主已臻化境，已是 FlagOS 江湖登顶大宗师。万能插座等精美周边，执掌 ROOT 权限。',
        prize: '万能插座等精美周边', role: 'master'
      };
      else if (score >= 60) return {
        title: '逍遥游侠 · 跨芯行者', mbti: 'FORK',
        desc: '能在Nvidia、NPU、GPGPU间自由迁移模型，左手算子库右手推理插件，洒脱如风。',
        comment: '侠客这把钥匙扣刻着“FlagOS”，往后江湖也算有头有脸。下次武林大会怕要坐上位了。',
        prize: '钥匙扣', role: 'ranger'
      };
      else return {
        title: '无名小卒 · 算子学徒', mbti: 'BUG',
        desc: '刚入山门的初学者，算子代码写一句报三句，常把Triton与LLVM念反。但每日勤读残卷，眼神已渐有光。',
        comment: '侠客别急，报错也是修为。<br><br>下次多看看FlagOS的修炼心法。',
        prize: '无', role: 'apprentice'
      };
    }
    function finishQuiz(){
      document.getElementById('progressFill').style.width='100%';
      trackEvent('quiz_finish',{score});
      showScreen('resultScreen');
      const container=document.getElementById('resultContent');
      const data = getTitleAndDesc(score);
      const figureHtml = getCharacterImage(data.role);
      const saveHint = '<p style="margin-top:12px; color:#ffd966; font-size:0.85rem;">请保存此界面，凭分数至兑奖处领取奖赏</p>';

      const socialLinksHtml = `
        <div class="social-links-grid">
          <a href="https://flagos.io/Home" target="_blank" class="social-link clickable-social">官网</a>
          <a href="https://github.com/flagos-ai" target="_blank" class="social-link clickable-social">GitHub</a>
          <a href="https://xhslink.com/m/3ICKAAaP2Lm" target="_blank" class="social-link clickable-social">小红书</a>
          <a href="https://space.bilibili.com/3546791834290849" target="_blank" class="social-link clickable-social">B站</a>
          <a href="https://www.zhihu.com/people/95-22-20-18/posts" target="_blank" class="social-link clickable-social">知乎</a>
          <a href="https://discord.gg/BwavgwVEkk" target="_blank" class="social-link clickable-social">Discord</a>
        </div>
      `;

      if(score>=80){
        container.innerHTML=`
          <div class="char-figure">${figureHtml}</div>
          <div class="result-score">${score} 分</div>
          <div style="font-size:1.6rem; color:#ffd966; font-weight:bold; letter-spacing:3px;">${data.title}</div>
          <div class="mbti-badge">${data.mbti}</div>
          <div class="title-card"><p>${data.desc}</p><p style="margin-top:8px; color:#ffd966; text-align:center;">奖赏：${data.prize}</p></div>
          <p style="color:#b0cce5; font-style:italic;">“${data.comment}”</p>
          <p style="font-size:0.85rem; color:#6e99b8; margin:14px 0;">点击按钮，关注以下江湖驿站，返回本页面即可<strong style="color:#ffd966;">再次挑战</strong>！</p>
          ${socialLinksHtml}
          ${saveHint}
        `;
      }else{
        const btnText = '再战江湖';
        const btnId = 'retryBtn';
        container.innerHTML=`
          <div class="char-figure">${figureHtml}</div>
          <div class="result-score">${score} 分</div>
          <div style="font-size:1.4rem; color:#5da6ff; font-weight:bold; letter-spacing:3px;">${data.title}</div>
          <div class="mbti-badge">${data.mbti}</div>
          <div class="title-card"><p>${data.desc}</p><p style="margin-top:8px; color:#ffd966; text-align:center;">奖赏：${data.prize}</p></div>
          <p style="color:#b0cce5; font-style:italic;">“${data.comment}”</p>
          <p style="font-size:0.85rem; color:#6e99b8; margin:14px 0;">点击按钮，关注以下江湖驿站，返回本页面即可<strong style="color:#ffd966;">再次挑战</strong>！</p>
          ${socialLinksHtml}
          <button class="btn btn-secondary hidden" id="${btnId}" onclick="retryQuiz()">${btnText}</button>
          ${saveHint}
        `;
        const retryBtn = document.getElementById(btnId);
        document.querySelectorAll('.clickable-social').forEach(link=>{
          link.addEventListener('click', function(e){
            if(retryBtn) retryBtn.classList.remove('hidden');
            trackEvent('social_click');
          });
        });
      }
      trackEvent('result_shown');
    }
    function retryQuiz(){ trackEvent('retry_click'); showScreen('homeScreen'); }

    trackEvent('page_view');
  </script>
</body>
</html>
